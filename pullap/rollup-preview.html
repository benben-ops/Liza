<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pullap Fitko — Rollup Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 40px 20px;
    gap: 16px;
  }
  .label { color: #888; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .rollup {
    width: 340px; height: 800px; position: relative; overflow: hidden;
    border-radius: 4px; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    background: linear-gradient(170deg, #2d1b69 0%, #1a0f3d 30%, #0d0723 60%, #1a0a0a 80%, #2d1500 100%);
  }
  .rollup::before {
    content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,170,80,0.08) 0%, transparent 70%);
    top: 120px; left: -80px; pointer-events: none;
  }
  .rollup::after {
    content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(147,90,200,0.12) 0%, transparent 70%);
    bottom: 100px; right: -50px; pointer-events: none;
  }
  .header {
    position: absolute; top: 0; left: 0; right: 0; padding: 22px 28px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(212,170,80,0.2);
  }
  .brand-logo { display: flex; flex-direction: column; }
  .brand-name { font-size: 18px; font-weight: 700; letter-spacing: 3px; color: #d4aa50; text-transform: uppercase; }
  .brand-sub { font-size: 8px; letter-spacing: 2.5px; color: rgba(212,170,80,0.6); text-transform: uppercase; margin-top: 2px; }
  .brand-symbol {
    width: 36px; height: 36px; border: 2px solid rgba(212,170,80,0.5); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 16px; color: #d4aa50;
  }
  .hero {
    position: absolute; top: 80px; left: 0; right: 0; height: 380px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .hero-circle {
    position: absolute; width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,170,80,0.15) 0%, rgba(212,170,80,0.04) 60%, transparent 100%);
    border: 1px solid rgba(212,170,80,0.15);
  }
  .hero-svg { position: relative; z-index: 2; filter: drop-shadow(0 0 20px rgba(212,170,80,0.3)); }
  .gym-name { position: absolute; top: 460px; left: 0; right: 0; text-align: center; padding: 0 20px; }
  .gym-name-main { font-size: 58px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; color: #fff; line-height: 1; text-shadow: 0 0 40px rgba(212,170,80,0.4); }
  .gym-name-sub { font-size: 14px; letter-spacing: 8px; color: #d4aa50; text-transform: uppercase; margin-top: 6px; font-weight: 300; }
  .gym-divider { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, #d4aa50, transparent); margin: 14px auto; }
  .slogan { position: absolute; top: 590px; left: 0; right: 0; text-align: center; padding: 0 30px; }
  .slogan-line1 { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: 1px; line-height: 1.3; }
  .slogan-line2 { font-size: 19px; font-weight: 300; color: rgba(255,255,255,0.85); letter-spacing: 1px; font-style: italic; line-height: 1.3; }
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 28px 22px;
    border-top: 1px solid rgba(212,170,80,0.2); background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-info { display: flex; flex-direction: column; gap: 3px; }
  .footer-web { font-size: 11px; color: #d4aa50; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }
  .footer-social { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .qr-placeholder {
    width: 50px; height: 50px; border: 1.5px solid rgba(212,170,80,0.4); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .btn {
    padding: 8px 16px; border: 1px solid rgba(212,170,80,0.4); border-radius: 20px;
    background: transparent; color: #d4aa50; font-size: 12px; cursor: pointer;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .btn:hover, .btn.active { background: rgba(212,170,80,0.15); border-color: #d4aa50; }
  .variant-label { color: #666; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<span class="label">Rollup Preview — 85 × 200 cm</span>

<div class="rollup">
  <div class="header">
    <div class="brand-logo">
      <div class="brand-name">Ana &amp; Ben</div>
      <div class="brand-sub">Osobnostný rozvoj</div>
    </div>
    <div class="brand-symbol">✦</div>
  </div>

  <div class="hero">
    <div class="hero-circle"></div>
    <svg class="hero-svg" width="200" height="300" viewBox="0 0 200 300" fill="none">
      <rect x="20" y="42" width="160" height="8" rx="4" fill="#d4aa50" opacity="0.8"/>
      <rect x="45" y="8" width="6" height="38" rx="3" fill="#d4aa50" opacity="0.4"/>
      <rect x="149" y="8" width="6" height="38" rx="3" fill="#d4aa50" opacity="0.4"/>
      <path d="M75 50 Q72 65 70 78" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
      <path d="M125 50 Q128 65 130 78" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="100" cy="90" rx="18" ry="20" fill="#c8a87a"/>
      <ellipse cx="100" cy="82" rx="19" ry="10" fill="#4a2800"/>
      <path d="M82 85 Q78 100 80 115" stroke="#4a2800" stroke-width="8" stroke-linecap="round"/>
      <path d="M118 85 Q122 100 120 115" stroke="#4a2800" stroke-width="8" stroke-linecap="round"/>
      <rect x="93" y="108" width="14" height="12" rx="4" fill="#c8a87a"/>
      <path d="M75 118 Q75 105 100 118 Q125 105 125 118 L122 175 Q100 185 78 175 Z" fill="url(#bodyGrad)"/>
      <path d="M75 118 Q65 115 62 108 Q58 100 60 95 Q65 88 70 92 Q74 96 75 118" fill="#c8a87a"/>
      <path d="M125 118 Q135 115 138 108 Q142 100 140 95 Q135 88 130 92 Q126 96 125 118" fill="#c8a87a"/>
      <path d="M60 95 Q60 82 70 78" stroke="#c8a87a" stroke-width="7" stroke-linecap="round"/>
      <path d="M140 95 Q140 82 130 78" stroke="#c8a87a" stroke-width="7" stroke-linecap="round"/>
      <path d="M78 175 Q70 195 72 215 Q74 228 80 225 Q88 222 88 210 Q90 195 95 180" fill="#3d2060"/>
      <path d="M122 175 Q130 195 128 215 Q126 228 120 225 Q112 222 112 210 Q110 195 105 180" fill="#3d2060"/>
      <path d="M72 215 Q65 235 70 250 Q76 260 82 255 Q88 250 86 238 Q84 228 80 225" fill="#c8a87a"/>
      <path d="M128 215 Q135 235 130 250 Q124 260 118 255 Q112 250 114 238 Q116 228 120 225" fill="#c8a87a"/>
      <ellipse cx="100" cy="160" rx="50" ry="80" fill="url(#glowGrad)" opacity="0.15"/>
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9060c0"/>
          <stop offset="100%" stop-color="#3d2060"/>
        </linearGradient>
        <radialGradient id="glowGrad">
          <stop offset="0%" stop-color="#d4aa50"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div class="gym-name">
    <div class="gym-name-main">PULLAP</div>
    <div class="gym-name-sub">fitko</div>
    <div class="gym-divider"></div>
  </div>

  <div class="slogan">
    <div class="slogan-line1">Zdvihni sa.</div>
    <div class="slogan-line2">Nájdi svoju silu.</div>
  </div>

  <div class="footer">
    <div class="footer-info">
      <div class="footer-web">anaben.sk</div>
      <div class="footer-social">@anaben.sk · Škola Uma</div>
    </div>
    <div class="qr-placeholder">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <rect x="2" y="2" width="14" height="14" rx="2" fill="none" stroke="#d4aa50" stroke-width="1.5"/>
        <rect x="5" y="5" width="8" height="8" rx="1" fill="#d4aa50" opacity="0.6"/>
        <rect x="24" y="2" width="14" height="14" rx="2" fill="none" stroke="#d4aa50" stroke-width="1.5"/>
        <rect x="27" y="5" width="8" height="8" rx="1" fill="#d4aa50" opacity="0.6"/>
        <rect x="2" y="24" width="14" height="14" rx="2" fill="none" stroke="#d4aa50" stroke-width="1.5"/>
        <rect x="5" y="27" width="8" height="8" rx="1" fill="#d4aa50" opacity="0.6"/>
        <rect x="24" y="20" width="4" height="4" fill="#d4aa50" opacity="0.5"/>
        <rect x="30" y="20" width="4" height="4" fill="#d4aa50" opacity="0.5"/>
        <rect x="24" y="26" width="4" height="8" fill="#d4aa50" opacity="0.5"/>
        <rect x="30" y="26" width="4" height="4" fill="#d4aa50" opacity="0.5"/>
        <rect x="36" y="26" width="2" height="4" fill="#d4aa50" opacity="0.5"/>
      </svg>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn active" onclick="setSlogan('Zdvihni sa.','Nájdi svoju silu.')">Varianta 1</button>
  <button class="btn" onclick="setSlogan('Sila,','ktorú si vždy mala.')">Varianta 2</button>
  <button class="btn" onclick="setSlogan('Posilni telo.','Objav seba.')">Varianta 3</button>
  <button class="btn" onclick="setSlogan('Každý pullup.','Jeden krok vpred.')">Varianta 4</button>
</div>
<span class="variant-label">Klikni pre výber sloganu</span>

<script>
function setSlogan(l1,l2){
  document.querySelector('.slogan-line1').textContent=l1;
  document.querySelector('.slogan-line2').textContent=l2;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
