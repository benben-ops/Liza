<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:#1a1a1a;background:#f0efe9;padding:1rem;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:600px;width:100%;padding:0 0 3rem}
.hdr{border-left:3px solid #E24B4A;padding:.5rem 0 .5rem 1rem;margin-bottom:2.5rem}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-.2px}
.hdr .sub{font-size:12px;color:#999;margin-top:3px}
.lang-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lang-card{border:1px solid #e0dfd8;border-radius:10px;background:#fff;padding:1.2rem 1.1rem;text-decoration:none;color:inherit;display:block;transition:border-color .15s,box-shadow .15s}
.lang-card:hover{border-color:#E24B4A;box-shadow:0 2px 12px rgba(226,75,74,.1)}
.lc-badge{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#E24B4A;margin-bottom:.4rem}
.lc-title{font-size:16px;font-weight:600;margin-bottom:.3rem;letter-spacing:-.2px}
.lc-desc{font-size:11px;color:#888;line-height:1.5}
.footer{margin-top:2.5rem;padding-top:1rem;border-top:1px solid #e0dfd8;text-align:center;font-size:11px;color:#bbb}
@media(max-width:480px){
  .lang-cards{grid-template-columns:1fr}
  body{align-items:flex-start}
}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G4RGGXE59G"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-G4RGGXE59G');
</script>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <h1>Horizont udalostí / Event Horizon</h1>
    <div class="sub">benben-ops · analytický projekt</div>
  </div>

  <div id="index-articles"></div>

  <div style="margin-top:1.5rem;text-align:center">
    <a href="horizont-udalosti.html" style="font-size:11px;color:#888;text-decoration:none">SK — Horizont udalostí</a>
    <span style="color:#ccc;margin:0 .5rem">|</span>
    <a href="event-horizon.html" style="font-size:11px;color:#888;text-decoration:none">EN — Event Horizon</a>
  </div>

  <div class="footer">benben-ops.github.io/Liza</div>

</div>
<script>
(function(){
  fetch('analyses.json').then(function(r){return r.json()}).then(function(data){
    var container=document.getElementById('index-articles');
    data.forEach(function(a){
      var row=document.createElement('div');
      row.className='lang-cards';
      row.style.marginBottom='0.75rem';
      // SK card
      var sk=document.createElement('a');
      sk.className='lang-card';
      if(a.sk.file){ sk.href=a.sk.file; }
      sk.innerHTML='<div class="lc-badge">SK</div><div class="lc-title">'+a.sk.title+'</div><div class="lc-desc">'+a.sk.meta+'</div>';
      row.appendChild(sk);
      // EN card
      var en=document.createElement('a');
      en.className='lang-card';
      if(a.en.file){ en.href=a.en.file; }
      else { en.style.opacity='0.5'; en.title='EN coming soon'; }
      en.innerHTML='<div class="lc-badge">EN</div><div class="lc-title">'+a.en.title+'</div><div class="lc-desc">'+a.en.meta+'</div>';
      row.appendChild(en);
      container.appendChild(row);
    });
  });
})();
</script>
</body>
</html>
